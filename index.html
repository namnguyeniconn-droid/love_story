<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Story</title>

    <link rel="stylesheet" href="css/style.css">
</head>
    <body>
<div id="loadingScreen">

    <div class="loadingContent">

        <div class="loadingHeart">❤️</div>

        <h1>Cảm ơn người đẹp đã ghé thăm !!!</h1>

        <p>Đang chuẩn bị vào album...</p>

        <div class="loadingBar">
            <div id="loadingProgress"></div>
        </div>

    </div>

</div>
    <video class="background" autoplay muted loop playsinline>
    <source src="videos/love.mp4" type="video/mp4">
</video>

    <div class="overlay"></div>

    <div id="hearts"></div>
<div id="flowers"></div>
<div id="fireworks"></div>
<div id="words"></div>
<div id="sparkles"></div>

<div id="cursorHeart">🌸</div>

    <div class="content">
    

        <h1>Xin Chào Em !!!</h1>

        <p></p>

        <button id="startBtn">Bắt đầu</button>

        <div id="photoBox">
            <img src="images/photo/photo1.jpg" alt="">
        </div>

    </div>
<div id="letterBox">
    <div class="letter">

        <h2>💌 Gửi em 💌</h2>

        <p>
            Cảm ơn em đã đến bên anh.
            Hy vọng nơi này sẽ lưu giữ kĩ niệm và
            chúng ta sẽ còn thật nhiều kỷ niệm đẹp cùng nhau ❤️
        </p>

        <button id="closeLetter">Đóng</button>

    </div>
</div>
<div id="galleryBox">

    <span id="closeGallery">✖</span>

    <img id="galleryImage" src="images/photo/photo1.jpg">

    <div class="galleryBtns">

        <button id="prevPhoto">⬅</button>

        <button id="nextPhoto">➡</button>

    </div>

</div>
    <audio id="music" src="music/yeuem.mp3"></audio>
<div class="menu-container">
<div class="menu-trigger" id="menuTrigger">
        ☰
    </div>
    <div class="menu-options" id="menuOptions">

        <div class="menu-option" id="messageBtn">💌</div>

        <div class="menu-option" id="giftBtn">🖼️</div>

        <div class="menu-option" id="musicBtn">🎵</div>

        <div class="menu-option">⚙️</div>

    </div>
</div>
    <script src="js/script.js"></script>

</body>
</html>
